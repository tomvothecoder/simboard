apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Service
    metadata:
      name: frontend
      labels:
        app: simboard-frontend
    spec:
      selector:
        app: simboard-frontend
      ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: 80
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
      labels:
        app: simboard-frontend
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: simboard-frontend
      template:
        metadata:
          labels:
            app: simboard-frontend
        spec:
          imagePullSecrets:
            - name: registry-nersc
          containers:
            - name: frontend
              image: registry.nersc.gov/e3sm/simboard/frontend:dev
              imagePullPolicy: Always
              ports:
                - containerPort: 80
                  name: http
                  protocol: TCP
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  add:
                    - CHOWN
                    - SETGID
                    - SETUID
                    - NET_BIND_SERVICE
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: false
                runAsNonRoot: false

# Notes:
# - Frontend image starts via the image CMD (no explicit command/args needed).
# - For production rollouts, use a versioned frontend tag and set pull policy to IfNotPresent.
