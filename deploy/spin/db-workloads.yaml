apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Service
    metadata:
      name: db
      labels:
        app: simboard-db
    spec:
      selector:
        app: simboard-db
      ports:
        - name: postgres
          protocol: TCP
          port: 5432
          targetPort: 5432
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: db
      labels:
        app: simboard-db
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: simboard-db
      template:
        metadata:
          labels:
            app: simboard-db
        spec:
          containers:
            - name: db
              image: postgres:17
              imagePullPolicy: Always
              ports:
                - containerPort: 5432
                  name: postgres
                  protocol: TCP
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: simboard-db
                      key: postgres_user
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: simboard-db
                      key: postgres_password
                - name: POSTGRES_DB
                  value: simboard
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_SERVER
                  value: db
                - name: PGDATA
                  value: /var/lib/postgresql/data/pgdata
                - name: PGTZ
                  value: America/Los_Angeles
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  add:
                    - CHOWN
                    - DAC_OVERRIDE
                    - FOWNER
                    - SETGID
                    - SETUID
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: false
                runAsNonRoot: false

# Notes:
# - This baseline avoids committing DB credentials; provide them via secret `simboard-db`.
# - Add persistent storage (PVC) in Rancher if DB data must survive pod replacement.
